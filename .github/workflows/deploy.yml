name: deploy

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      # Pinned to 3.11 everywhere in this workflow, matching the deploy job —
      # see the note there for why (Databricks Serving's build environment
      # doesn't reliably support anything newer, as Task 2.3 found out the
      # hard way; keeping every job on the same interpreter avoids surprises
      # if lint/test behavior ever depends on it).
      - run: uv python install 3.11
      - run: uv sync --python 3.11 --extra dev
      - name: Lint
        run: uv run --python 3.11 ruff check agent/ client/
      - name: Test (offline smoke test — no Databricks, no network)
        run: uv run --python 3.11 pytest -q

  deploy:
    needs: lint-and-test
    if: github.ref == 'refs/heads/main' && github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    env:
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      # Not secrets — same non-sensitive config used in the real deployment
      # (see .env.example / Analysis.md). Kept here rather than as repo
      # Variables to keep this file the single source of truth.
      DATABRICKS_MODEL: databricks-meta-llama-3-3-70b-instruct
      EMBEDDINGS_ENDPOINT: databricks-gte-large-en
      UC_CATALOG: cs4603
      UC_SCHEMA: default
      VECTOR_SEARCH_ENDPOINT: cs4603_rag_endpoint
      VECTOR_SEARCH_INDEX: cs4603.default.emanqureshi_analyst_index
      SERVING_ENDPOINT_NAME: emanqureshi-document-analyst
      SECRET_SCOPE: cs4603-deploy
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v3
      - run: uv python install 3.11
      # deployment/deploy.py must actually RUN under Python 3.11, not just
      # declare it in conda_env: MLflow writes python_env.yaml (what the
      # serving container's environment is built from) from the CALLING
      # interpreter's own version, regardless of the conda_env override —
      # discovered the hard way fixing Task 2.3 (see Analysis.md). A CI
      # runner defaulting to a newer Python here would silently reproduce
      # the same stuck-build failure.
      - run: uv sync --python 3.11
      - name: Log, register, and deploy
        run: uv run --python 3.11 python deployment/deploy.py
